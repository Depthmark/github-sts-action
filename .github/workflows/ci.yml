---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: |
          node --check index.js
          node --check post.js

      - name: Validate action.yml
        run: |
          node -e "
            const fs = require('fs');
            const yaml = fs.readFileSync('action.yml', 'utf8');
            if (!yaml.includes('name:')) throw new Error('action.yml missing name');
            if (!yaml.includes('description:')) throw new Error('action.yml missing description');
            if (!yaml.includes('runs:')) throw new Error('action.yml missing runs');
            console.log('action.yml structure OK');
          "

      - name: Ensure no node_modules checked in
        run: |
          if [ -d node_modules ]; then
            echo "::error::node_modules directory should not be committed"
            exit 1
          fi
